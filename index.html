<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Quản Lý Phân Phối Cần Thơ - Hậu Giang</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <style>
        /* Tùy chỉnh CSS cho marker hiển thị task ngay trên bản đồ */
        .custom-map-marker {
            background: transparent;
            border: none;
        }
        .marker-card {
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid #3b82f6; 
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: max-content;
            max-width: 220px;
            padding: 10px;
            position: relative;
            transform: translate(-50%, -100%);
            margin-top: -15px;
            pointer-events: auto;
            transition: all 0.2s ease;
            cursor: pointer;
            z-index: 1000;
        }
        .marker-card:hover {
            transform: translate(-50%, -100%) scale(1.05);
            z-index: 2000;
            border-color: #2563eb; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .marker-card::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #3b82f6 transparent transparent transparent;
            display: block;
            width: 0;
        }
        .marker-card:hover::after {
            border-color: #2563eb transparent transparent transparent;
        }
        
        .marker-title {
            font-weight: 700;
            color: #1e3a8a; 
            font-size: 14px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 4px;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .marker-tasks-list {
            list-style-type: disc;
            padding-left: 18px;
            margin: 0;
            font-size: 12px;
            color: #374151; 
            line-height: 1.4;
        }
        .marker-pin-point {
            width: 14px;
            height: 14px;
            background-color: #ef4444; 
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            bottom: -7px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            z-index: 999;
        }
        
        /* Ẩn controls mặc định của Leaflet cho gọn */
        .leaflet-control-zoom {
            border: none !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
            margin-top: 20px !important;
            margin-right: 20px !important;
        }
    </style>
</head>
<body class="bg-gray-100 m-0 p-0 absolute inset-0 overflow-hidden">
    <div id="root" class="absolute inset-0"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Dữ liệu mẫu khớp với ảnh chụp của bạn
        const initialShops = [
            { 
                id: '1', 
                name: 'Đại lý Ninh Kiều', 
                lat: 10.0335, 
                lng: 105.7820, 
                tasks: ['Kiểm tra tồn kho bia', 'Chụp ảnh kệ trưng bày chính', 'Thu công nợ tuần trước'] 
            },
            { 
                id: '2', 
                name: 'Tạp hóa Vị Thanh', 
                lat: 9.7820, 
                lng: 105.4650, 
                tasks: ['Phát tờ rơi khuyến mãi', 'Giới thiệu sản phẩm mới'] 
            },
            { 
                id: '3', 
                name: 'Cửa hàng Cái Răng', 
                lat: 9.9972, 
                lng: 105.7584, 
                tasks: ['Ký hợp đồng quý 3', 'Giao 10 thùng hàng'] 
            }
        ];

        // --- Icons (SVG) ---
        const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const IconX = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconRoute = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>;
        const IconUndo = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconEyeOff = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>;

        function App() {
            // --- States ---
            const [shops, setShops] = useState(() => {
                try {
                    const saved = localStorage.getItem('mekongShopsData');
                    if (saved) return JSON.parse(saved);
                } catch(e) { console.error(e); }
                return initialShops;
            });
            const [editingShop, setEditingShop] = useState(null); 
            const [isAddingNew, setIsAddingNew] = useState(false);
            const [pickingLocation, setPickingLocation] = useState(false); 
            const [shopToDelete, setShopToDelete] = useState(null);
            const [alertMsg, setAlertMsg] = useState('');
            
            const [activeTab, setActiveTab] = useState('shops');
            const [routes, setRoutes] = useState(() => {
                try {
                    const saved = localStorage.getItem('mekongRoutesData');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) { return []; }
            });
            const [isDrawingMode, setIsDrawingMode] = useState(false);
            const [currentRoutePoints, setCurrentRoutePoints] = useState([]);
            const [showRouteNameModal, setShowRouteNameModal] = useState(false);
            const [newRouteName, setNewRouteName] = useState('');
            const [routeToDelete, setRouteToDelete] = useState(null);
            
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersLayerRef = useRef(null);
            const routesLayerRef = useRef(null);

            // Persist data
            useEffect(() => { localStorage.setItem('mekongShopsData', JSON.stringify(shops)); }, [shops]);
            useEffect(() => { localStorage.setItem('mekongRoutesData', JSON.stringify(routes)); }, [routes]);

            // --- Initialize Map ---
            useEffect(() => {
                if (!mapRef.current || mapInstance.current) return;
                
                if (typeof L === 'undefined') {
                    setAlertMsg("Lỗi: Không thể tải thư viện Bản đồ. Vui lòng kiểm tra kết nối mạng.");
                    return;
                }

                try {
                    // Zoom vào giữa Cần Thơ & Hậu Giang
                    const map = L.map(mapRef.current, { zoomControl: false }).setView([9.92, 105.65], 10);
                    mapInstance.current = map;
                    
                    // Thêm nút zoom ở góc phải dưới
                    L.control.zoom({ position: 'bottomright' }).addTo(map);
                    
                    // Lớp bản đồ chính thức
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                        maxZoom: 19,
                    }).addTo(map);

                    markersLayerRef.current = L.layerGroup().addTo(map);
                    routesLayerRef.current = L.layerGroup().addTo(map);

                    map.on('click', (e) => {
                        window.dispatchEvent(new CustomEvent('mapClicked', { detail: e.latlng }));
                    });

                    // Khắc phục triệt để lỗi "xám màn hình" do render sai kích thước
                    const fixMapSize = () => {
                        if (mapInstance.current) mapInstance.current.invalidateSize();
                    };
                    
                    setTimeout(fixMapSize, 100);
                    setTimeout(fixMapSize, 500);

                    if (window.ResizeObserver) {
                        const resizeObserver = new ResizeObserver(fixMapSize);
                        resizeObserver.observe(mapRef.current);
                        return () => { 
                            resizeObserver.disconnect(); 
                            if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; } 
                        };
                    }
                } catch (error) {
                    console.error("Lỗi khởi tạo bản đồ:", error);
                }

                return () => {
                    if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; }
                };
            }, []);

            // Handle Map Clicks
            useEffect(() => {
                const handleMapClick = (e) => {
                    const latlng = e.detail;
                    if (pickingLocation && editingShop) {
                        setEditingShop(prev => ({
                            ...prev,
                            lat: parseFloat(latlng.lat.toFixed(5)),
                            lng: parseFloat(latlng.lng.toFixed(5))
                        }));
                        setPickingLocation(false);
                    } else if (isDrawingMode) {
                        setCurrentRoutePoints(prev => [...prev, [latlng.lat, latlng.lng]]);
                    }
                };
                window.addEventListener('mapClicked', handleMapClick);
                return () => window.removeEventListener('mapClicked', handleMapClick);
            }, [pickingLocation, editingShop, isDrawingMode]);

            // Draw Markers
            useEffect(() => {
                if (!mapInstance.current || !markersLayerRef.current) return;
                const layerGroup = markersLayerRef.current;
                layerGroup.clearLayers(); 

                shops.forEach(shop => {
                    if (!shop.lat || !shop.lng) return;
                    
                    const latNum = Number(shop.lat);
                    const lngNum = Number(shop.lng);
                    if (isNaN(latNum) || isNaN(lngNum)) return;

                    const tasksHtml = shop.tasks.length > 0 
                        ? `<ul class="marker-tasks-list">${shop.tasks.map(t => `<li>${t}</li>`).join('')}</ul>`
                        : `<span class="text-xs text-gray-400 italic block mt-1">Chưa có công việc</span>`;

                    const htmlContent = `
                        <div class="marker-card">
                            <div class="marker-title">${shop.name}</div>
                            ${tasksHtml}
                        </div>
                        <div class="marker-pin-point"></div>
                    `;

                    const icon = L.divIcon({ className: 'custom-map-marker', html: htmlContent, iconSize: [0, 0], iconAnchor: [0, 0] });
                    const marker = L.marker([latNum, lngNum], { icon: icon });
                    
                    marker.on('click', () => {
                        handleEditShop(shop);
                        mapInstance.current.flyTo([latNum, lngNum], 14, { duration: 0.5 });
                    });
                    layerGroup.addLayer(marker);
                });
            }, [shops]);

            // Draw Routes
            useEffect(() => {
                if (!mapInstance.current || !routesLayerRef.current) return;
                const layerGroup = routesLayerRef.current;
                layerGroup.clearLayers();

                routes.forEach(route => {
                    if (route.visible !== false) {
                        const polyline = L.polyline(route.points, { color: '#4f46e5', weight: 5, opacity: 0.8 }).addTo(layerGroup);
                        polyline.bindTooltip(route.name, { sticky: true, className: 'font-bold text-indigo-900 bg-white px-2 py-1 rounded shadow-sm border-0' });
                    }
                });

                if (currentRoutePoints.length > 0) {
                    L.polyline(currentRoutePoints, { color: '#ef4444', weight: 4, dashArray: '5, 10' }).addTo(layerGroup);
                    currentRoutePoints.forEach(point => {
                        L.circleMarker(point, { radius: 6, color: '#ef4444', fillColor: '#fff', fillOpacity: 1, weight: 2 }).addTo(layerGroup);
                    });
                }
            }, [routes, currentRoutePoints]);

            // --- Handlers Shop ---
            const handleAddClick = () => {
                setIsAddingNew(true);
                setEditingShop({ id: Date.now().toString(), name: '', lat: 10.0335, lng: 105.7820, tasks: [''] });
                setPickingLocation(false);
                setActiveTab('shops');
            };

            const handleEditShop = (shop) => {
                setIsAddingNew(false);
                setEditingShop({ ...shop });
                setPickingLocation(false);
                setActiveTab('shops');
                if (mapInstance.current && shop.lat && shop.lng) {
                     mapInstance.current.flyTo([parseFloat(shop.lat), parseFloat(shop.lng)], 14, { duration: 0.5 });
                }
            };

            const handleDeleteShop = (id, e) => {
                e.stopPropagation(); 
                setShopToDelete(id);
            };

            const confirmDelete = () => {
                if (shopToDelete) {
                    setShops(prev => prev.filter(s => s.id !== shopToDelete));
                    if (editingShop?.id === shopToDelete) setEditingShop(null);
                    setShopToDelete(null);
                }
            };

            const handleSaveShop = () => {
                if (!editingShop.name.trim()) {
                    setAlertMsg('Vui lòng nhập tên cửa hàng');
                    return;
                }
                const cleanedTasks = editingShop.tasks.filter(t => t.trim() !== '');
                
                const shopToSave = { 
                    ...editingShop, 
                    tasks: cleanedTasks,
                    lat: parseFloat(editingShop.lat) || 0,
                    lng: parseFloat(editingShop.lng) || 0
                };

                if (isAddingNew) { setShops([...shops, shopToSave]); } else { setShops(shops.map(s => s.id === shopToSave.id ? shopToSave : s)); }
                setEditingShop(null);
                setPickingLocation(false);
            };

            const handleCancelEdit = () => { setEditingShop(null); setPickingLocation(false); };
            const updateEditingShop = (field, value) => { setEditingShop(prev => ({ ...prev, [field]: value })); };
            const updateTask = (index, value) => { const newTasks = [...editingShop.tasks]; newTasks[index] = value; updateEditingShop('tasks', newTasks); };
            const addTaskField = () => { updateEditingShop('tasks', [...editingShop.tasks, '']); };
            const removeTaskField = (index) => { const newTasks = editingShop.tasks.filter((_, i) => i !== index); updateEditingShop('tasks', newTasks); };

            // --- Handlers Tuyến đường ---
            const startDrawing = () => { setIsDrawingMode(true); setCurrentRoutePoints([]); setActiveTab('routes'); };
            const undoLastPoint = () => setCurrentRoutePoints(prev => prev.slice(0, -1));
            const cancelDrawing = () => { setIsDrawingMode(false); setCurrentRoutePoints([]); };
            const finishDrawing = () => {
                if (currentRoutePoints.length < 2) { setAlertMsg('Vui lòng vẽ ít nhất 2 điểm để tạo thành tuyến đường.'); return; }
                setNewRouteName('');
                setShowRouteNameModal(true);
            };
            const saveRoute = () => {
                if (!newRouteName.trim()) { setAlertMsg('Vui lòng nhập tên tuyến đường.'); return; }
                setRoutes([...routes, { id: Date.now().toString(), name: newRouteName.trim(), points: currentRoutePoints, visible: true }]);
                setShowRouteNameModal(false);
                setIsDrawingMode(false);
                setCurrentRoutePoints([]);
            };
            const confirmDeleteRoute = () => { if (routeToDelete) { setRoutes(prev => prev.filter(r => r.id !== routeToDelete)); setRouteToDelete(null); } };
            const toggleRouteVisibility = (id) => { setRoutes(prev => prev.map(r => r.id === id ? { ...r, visible: r.visible === false ? true : false } : r)); };

            return (
                <div class="flex flex-col md:flex-row w-full h-full text-gray-800">
                    {/* --- Sidebar Left --- */}
                    <div class={`w-full md:w-[400px] lg:w-[450px] bg-gray-50 flex flex-col shadow-2xl z-10 transition-all ${(pickingLocation || isDrawingMode) ? 'pointer-events-none opacity-50' : ''}`}>
                        
                        {/* Header */}
                        <div class="bg-[#4267B2] text-white p-4 flex justify-between items-center shrink-0">
                            <h1 class="font-bold text-lg flex items-center gap-2 tracking-wide"><IconMapPin /> QL. Nhà Phân Phối</h1>
                            <button onClick={handleAddClick} disabled={editingShop !== null || isDrawingMode} class="bg-white/20 hover:bg-white/30 text-white p-2 rounded-full transition-colors disabled:opacity-50" title="Thêm cửa hàng mới">
                                <IconPlus />
                            </button>
                        </div>

                        {/* Tabs */}
                        <div class="flex border-b border-gray-200 shrink-0 bg-white">
                            <button onClick={() => {setActiveTab('shops'); setEditingShop(null);}} class={`flex-1 py-3 text-sm font-bold transition-colors border-b-2 ${activeTab === 'shops' ? 'text-[#4267B2] border-[#4267B2]' : 'text-gray-400 border-transparent hover:text-gray-600'}`}>Nhà Phân Phối</button>
                            <button onClick={() => {setActiveTab('routes'); setEditingShop(null);}} class={`flex-1 py-3 text-sm font-bold transition-colors border-b-2 flex justify-center items-center gap-2 ${activeTab === 'routes' ? 'text-[#4267B2] border-[#4267B2]' : 'text-gray-400 border-transparent hover:text-gray-600'}`}>
                                <IconRoute /> Tuyến Đường
                            </button>
                        </div>

                        {/* Content Area */}
                        <div class="flex-1 overflow-y-auto p-4 custom-scrollbar">
                            {activeTab === 'shops' ? (
                                editingShop ? (
                                    /* Form Shop */
                                    <div class="bg-white rounded-xl p-5 border border-gray-200 shadow-sm">
                                        <h2 class="font-bold text-gray-800 mb-4 pb-3 border-b border-gray-100 flex items-center gap-2">
                                            {isAddingNew ? <><IconPlus/> Thêm Điểm Mới</> : <><IconEdit/> Cập Nhật Thông Tin</>}
                                        </h2>
                                        
                                        <div class="space-y-5">
                                            <div>
                                                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Tên cửa hàng/đại lý</label>
                                                <input type="text" value={editingShop.name} onChange={(e) => updateEditingShop('name', e.target.value)} class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 focus:bg-white outline-none transition-all" placeholder="Nhập tên..." />
                                            </div>
                                            
                                            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                                <div class="flex justify-between items-center mb-3">
                                                    <label class="block text-sm font-semibold text-gray-700">Tọa độ Bản đồ</label>
                                                    <button onClick={() => setPickingLocation(true)} class="text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-md flex items-center gap-1.5 hover:bg-blue-200 pointer-events-auto font-medium transition-colors"><IconTarget /> Ghim vị trí</button>
                                                </div>
                                                <div class="flex gap-3">
                                                    <div class="w-1/2">
                                                        <span class="text-xs text-gray-500 mb-1 block">Vĩ độ (Lat)</span>
                                                        <input type="number" step="any" value={editingShop.lat} onChange={(e) => updateEditingShop('lat', e.target.value)} class="w-full p-2 border border-gray-300 rounded bg-white text-sm outline-none focus:border-blue-400" />
                                                    </div>
                                                    <div class="w-1/2">
                                                        <span class="text-xs text-gray-500 mb-1 block">Kinh độ (Lng)</span>
                                                        <input type="number" step="any" value={editingShop.lng} onChange={(e) => updateEditingShop('lng', e.target.value)} class="w-full p-2 border border-gray-300 rounded bg-white text-sm outline-none focus:border-blue-400" />
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <div class="flex justify-between items-center mb-2">
                                                    <label class="block text-sm font-semibold text-gray-700">Công việc cần làm</label>
                                                    <button onClick={addTaskField} class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1 bg-blue-50 px-2 py-1 rounded">+ Thêm</button>
                                                </div>
                                                <div class="space-y-2.5">
                                                    {editingShop.tasks.map((task, index) => (
                                                        <div key={index} class="flex gap-2 items-center">
                                                            <div class="w-2 h-2 rounded-full bg-blue-400 shrink-0"></div>
                                                            <input type="text" value={task} onChange={(e) => updateTask(index, e.target.value)} class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-md text-sm focus:ring-1 focus:ring-blue-400 focus:bg-white outline-none transition-all" placeholder={`Việc thứ ${index + 1}...`} />
                                                            <button onClick={() => removeTaskField(index)} class="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors" title="Xóa việc"><IconX /></button>
                                                        </div>
                                                    ))}
                                                    {editingShop.tasks.length === 0 && <p class="text-sm text-gray-400 italic text-center py-2 bg-gray-50 rounded border border-dashed border-gray-200">Chưa có công việc nào.</p>}
                                                </div>
                                            </div>

                                            <div class="flex gap-3 pt-5 mt-2 pointer-events-auto">
                                                <button onClick={handleCancelEdit} class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors">Hủy</button>
                                                <button onClick={handleSaveShop} class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg flex items-center justify-center gap-2 transition-colors shadow-md"><IconCheck /> Lưu thay đổi</button>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    /* List Shop */
                                    <div class="space-y-3">
                                        {shops.length === 0 ? (
                                            <div class="text-center py-12 text-gray-400 flex flex-col items-center gap-3">
                                                <IconMapPin />
                                                <p>Chưa có dữ liệu nhà phân phối.</p>
                                                <button onClick={handleAddClick} class="mt-2 text-blue-600 font-medium bg-blue-50 px-4 py-2 rounded-full">+ Thêm ngay</button>
                                            </div>
                                        ) : (
                                            shops.map(shop => (
                                                <div key={shop.id} onClick={() => handleEditShop(shop)} class="bg-gray-200/50 border border-gray-300 rounded-lg p-4 hover:border-blue-400 hover:bg-white cursor-pointer transition-all group">
                                                    <div class="flex justify-between items-start mb-2">
                                                        <h3 class="font-bold text-gray-800 text-lg group-hover:text-blue-700 transition-colors">{shop.name}</h3>
                                                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={(e) => { e.stopPropagation(); handleEditShop(shop); }} class="p-1.5 text-blue-600 hover:bg-blue-50 rounded" title="Sửa"><IconEdit /></button>
                                                            <button onClick={(e) => handleDeleteShop(shop.id, e)} class="p-1.5 text-red-500 hover:bg-red-50 rounded" title="Xóa"><IconTrash /></button>
                                                        </div>
                                                    </div>
                                                    <div class="text-xs text-gray-500 mb-3 flex items-center gap-1">
                                                        📍 {Number(shop.lat || 0).toFixed(4)}, {Number(shop.lng || 0).toFixed(4)}
                                                    </div>
                                                    <div>
                                                        <span class="text-xs font-semibold text-gray-600 bg-gray-200 px-2.5 py-1 rounded-full inline-block mb-2">{shop.tasks.length} công việc</span>
                                                        <ul class="text-sm text-gray-600 pl-4 list-disc space-y-1">
                                                            {shop.tasks.map((task, i) => <li key={i} class="truncate">{task}</li>)}
                                                        </ul>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )
                            ) : (
                                /* List Routes */
                                <div class="space-y-4">
                                    <button onClick={startDrawing} class="w-full bg-blue-50 border-2 border-dashed border-blue-300 text-blue-700 py-4 rounded-xl font-bold hover:bg-blue-100 flex justify-center items-center gap-2 transition-colors">
                                        <IconRoute /> Bắt đầu vẽ tuyến đường
                                    </button>
                                    
                                    <div class="space-y-3 mt-4">
                                        {routes.length === 0 ? (
                                            <div class="text-center py-10 text-gray-400 text-sm">Chưa có tuyến đường nào.</div>
                                        ) : (
                                            routes.map(route => {
                                                const isVisible = route.visible !== false;
                                                return (
                                                    <div key={route.id} class={`bg-white border ${isVisible ? 'border-gray-200 hover:border-blue-300' : 'border-gray-100 bg-gray-50 opacity-60'} rounded-lg p-3 hover:shadow-sm transition-all group flex justify-between items-center`}>
                                                        <div>
                                                            <h3 class={`font-bold text-base ${isVisible ? 'text-gray-800 group-hover:text-blue-700' : 'text-gray-400 line-through'}`}>{route.name}</h3>
                                                            <div class="text-xs text-gray-500 mt-1">📍 Bao gồm {route.points.length} điểm</div>
                                                        </div>
                                                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button onClick={() => toggleRouteVisibility(route.id)} class="p-2 text-gray-600 hover:bg-gray-100 rounded-full transition-colors" title={isVisible ? "Ẩn khỏi bản đồ" : "Hiện lên bản đồ"}>
                                                                {isVisible ? <IconEye /> : <IconEyeOff />}
                                                            </button>
                                                            <button onClick={() => setRouteToDelete(route.id)} class="p-2 text-red-500 hover:bg-red-50 rounded-full transition-colors" title="Xóa tuyến đường">
                                                                <IconTrash />
                                                            </button>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* --- Map Area Right --- */}
                    <div class="flex-1 relative w-full h-full bg-[#d4dadc]">
                        <div id="map-container" ref={mapRef} class="absolute inset-0 z-0" style={{ width: '100%', height: '100%' }}></div>
                        
                        {pickingLocation && (
                            <div class="absolute top-6 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full shadow-lg font-medium flex items-center gap-3 z-50 animate-bounce cursor-crosshair pointer-events-none">
                                <IconTarget /> Click lên bản đồ để lấy tọa độ
                            </div>
                        )}
                        {pickingLocation && <style>{`#map-container, .leaflet-interactive { cursor: crosshair !important; }`}</style>}
                        
                        {isDrawingMode && (
                            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-white p-2 rounded-xl shadow-2xl flex items-center gap-2 z-[2000] border border-gray-200 pointer-events-auto">
                                <div class="px-4 text-blue-700 font-bold flex items-center gap-2 border-r border-gray-200">
                                    <span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span></span>
                                    Đang vẽ tuyến
                                </div>
                                <div class="text-sm text-gray-600 px-3 flex items-center">
                                    Đã chấm: <span class="font-bold text-blue-700 ml-1">{currentRoutePoints.length}</span>
                                </div>
                                <div class="flex gap-2 pl-3">
                                    <button onClick={undoLastPoint} disabled={currentRoutePoints.length === 0} class="px-3 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-50 flex items-center gap-1 text-sm font-medium transition-colors"><IconUndo /> Hoàn tác</button>
                                    <button onClick={cancelDrawing} class="px-3 py-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 flex items-center gap-1 text-sm font-medium transition-colors"><IconX /> Hủy</button>
                                    <button onClick={finishDrawing} class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center gap-1 text-sm font-medium shadow-md transition-colors"><IconCheck /> Xong</button>
                                </div>
                            </div>
                        )}
                        {isDrawingMode && <style>{`#map-container, .leaflet-interactive { cursor: crosshair !important; }`}</style>}
                    </div>

                    {/* --- Global Modals --- */}
                    {shopToDelete && (
                        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div class="bg-white p-6 rounded-2xl shadow-2xl w-[360px] max-w-full transform transition-all">
                                <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mb-4">
                                    <IconTrash />
                                </div>
                                <h3 class="text-xl font-bold text-gray-900 mb-2">Xóa địa điểm?</h3>
                                <p class="text-gray-500 mb-6 text-sm leading-relaxed">Bạn có chắc chắn muốn xóa điểm phân phối này không? Hành động này không thể khôi phục.</p>
                                <div class="flex gap-3">
                                    <button onClick={() => setShopToDelete(null)} class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition-colors">Hủy</button>
                                    <button onClick={confirmDelete} class="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-medium transition-colors shadow-md">Xóa điểm</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {routeToDelete && (
                        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div class="bg-white p-6 rounded-2xl shadow-2xl w-[360px] max-w-full transform transition-all">
                                <div class="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mb-4">
                                    <IconTrash />
                                </div>
                                <h3 class="text-xl font-bold text-gray-900 mb-2">Xóa tuyến đường?</h3>
                                <p class="text-gray-500 mb-6 text-sm leading-relaxed">Dữ liệu tuyến đường này sẽ bị xóa vĩnh viễn khỏi hệ thống.</p>
                                <div class="flex gap-3">
                                    <button onClick={() => setRouteToDelete(null)} class="flex-1 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition-colors">Hủy</button>
                                    <button onClick={confirmDeleteRoute} class="flex-1 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-medium transition-colors shadow-md">Xóa ngay</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showRouteNameModal && (
                        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div class="bg-white p-7 rounded-2xl shadow-2xl w-[420px] max-w-full">
                                <h3 class="text-xl font-bold text-gray-900 mb-5 flex items-center gap-2"><IconRoute /> Lưu tuyến đường mới</h3>
                                <div class="mb-6">
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tên tuyến đường</label>
                                    <input type="text" autoFocus value={newRouteName} onChange={(e) => setNewRouteName(e.target.value)} placeholder="VD: Tuyến đi kho Hậu Giang..." class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" onKeyDown={(e) => e.key === 'Enter' && saveRoute()} />
                                </div>
                                <div class="flex justify-end gap-3">
                                    <button onClick={() => setShowRouteNameModal(false)} class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-medium transition-colors">Hủy bỏ</button>
                                    <button onClick={saveRoute} class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-colors shadow-md">Lưu lại</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {alertMsg && (
                        <div class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
                            <div class="bg-white p-6 rounded-2xl shadow-2xl w-[320px] max-w-full text-center transform transition-all">
                                <div class="w-14 h-14 rounded-full bg-yellow-100 text-yellow-500 flex items-center justify-center mx-auto mb-4">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                                </div>
                                <h3 class="text-lg font-bold text-gray-900 mb-2">Thông báo</h3>
                                <p class="text-gray-500 mb-6 text-sm">{alertMsg}</p>
                                <button onClick={() => setAlertMsg('')} class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium transition-colors shadow-md">Đã hiểu</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
